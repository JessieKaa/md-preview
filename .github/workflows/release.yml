name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Existing tag to publish, for example v1.1.22-fork'
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.release_tag || github.ref }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Build Universal Binary
        run: |
          cargo build --release --target aarch64-apple-darwin
          cargo build --release --target x86_64-apple-darwin
          lipo -create \
            target/aarch64-apple-darwin/release/md-preview \
            target/x86_64-apple-darwin/release/md-preview \
            -output target/release/md-preview-universal

      - name: Create .app bundle
        run: |
          chmod +x bundle.sh
          bash bundle.sh

      - name: Create DMG
        run: |
          brew install create-dmg
          create-dmg \
            --volname "MD Preview" \
            --volicon "assets/icon.icns" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 100 \
            --icon "MD Preview.app" 150 185 \
            --app-drop-link 450 185 \
            --no-internet-enable \
            "MD-Preview-macOS-universal.dmg" \
            "target/MD Preview.app"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: MD-Preview-macOS-universal.dmg

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.release_tag || github.ref }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install WebView2
        shell: pwsh
        run: |
          # WebView2 is pre-installed on Windows 10/11
          # Just need to build
          echo "WebView2 should be available on the runner"

      - name: Build
        run: cargo build --release

      - name: Package
        shell: bash
        run: |
          cp target/release/md-preview.exe MD-Preview-windows-x64.exe

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows
          path: MD-Preview-windows-x64.exe

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.release_tag || github.ref }}

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build
        run: cargo build --release

      - name: Package
        run: |
          mkdir -p dist
          cp target/release/md-preview dist/
          tar czf MD-Preview-linux-x64.tar.gz -C dist .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-tar
          path: MD-Preview-linux-x64.tar.gz

  build-android:
    runs-on: ubuntu-latest
    env:
      MD_PREVIEW_ANDROID_KEYSTORE: ${{ github.workspace }}/mobile/android/signing/release.keystore
      MD_PREVIEW_ANDROID_KEYSTORE_PASSWORD: ${{ secrets.MD_PREVIEW_ANDROID_KEYSTORE_PASSWORD }}
      MD_PREVIEW_ANDROID_KEY_ALIAS: ${{ secrets.MD_PREVIEW_ANDROID_KEY_ALIAS }}
      MD_PREVIEW_ANDROID_KEY_PASSWORD: ${{ secrets.MD_PREVIEW_ANDROID_KEY_PASSWORD }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.release_tag || github.ref }}

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Restore Android keystore
        shell: bash
        env:
          MD_PREVIEW_ANDROID_KEYSTORE_B64: ${{ secrets.MD_PREVIEW_ANDROID_KEYSTORE_B64 }}
        run: |
          mkdir -p mobile/android/signing
          printf '%s' "$MD_PREVIEW_ANDROID_KEYSTORE_B64" | base64 --decode > "$MD_PREVIEW_ANDROID_KEYSTORE"

      - name: Build Android release artifacts
        run: |
          cd mobile/android
          gradle :app:assembleRelease :app:bundleRelease

      - name: Upload Android APKs
        uses: actions/upload-artifact@v4
        with:
          name: android-apks
          path: mobile/android/app/build/outputs/apk/release/*.apk

      - name: Upload Android App Bundle
        uses: actions/upload-artifact@v4
        with:
          name: android-aab
          path: mobile/android/app/build/outputs/bundle/release/app-release.aab

  publish-release:
    needs: [build-macos, build-windows, build-linux, build-android]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.release_tag || github.ref_name }}
          files: |
            MD-Preview-macOS-universal.dmg
            MD-Preview-windows-x64.exe
            MD-Preview-linux-x64.tar.gz
            app-armeabi-v7a-release.apk
            app-arm64-v8a-release.apk
            app-x86_64-release.apk
            app-release.aab
          generate_release_notes: true
